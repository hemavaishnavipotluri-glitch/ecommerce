<h2>Products</h2>

<a href="/add-product">+ Add Product</a>

{% for p in products %}
    <div style="border:1px solid #ccc; padding:10px; margin:10px;">
        <h3>{{ p['name'] }}</h3>
        <p>{{ p['description'] }}</p>
        <p>₹{{ p['price'] }}</p>

        {% if p['image'] %}
            <img src="{{ p['image'] }}" width="120">
        {% endif %}
    </div>
{% endfor %}
